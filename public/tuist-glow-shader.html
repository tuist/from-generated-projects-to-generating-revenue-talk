<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuist Glow Shader</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  canvas { display: block; width: 100%; height: 100%; }

  .controls {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(30, 10, 60, 0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    color: #e0d8ff;
    font-size: 13px;
    z-index: 10;
    min-width: 240px;
    user-select: none;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .controls:hover {
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .controls-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    cursor: grab;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .controls-header:active { cursor: grabbing; }
  .controls-header h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: rgba(255,255,255,0.45);
    font-weight: 500;
    margin: 0;
    pointer-events: none;
  }
  .collapse-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.45);
    cursor: pointer;
    padding: 2px;
    display: flex;
    align-items: center;
    transition: transform 0.25s ease, color 0.2s;
  }
  .collapse-btn:hover { color: rgba(255,255,255,0.8); }
  .collapse-btn.collapsed { transform: rotate(-90deg); }
  .controls-body {
    padding: 6px 18px 18px;
    max-height: 70vh;
    overflow-y: auto;
    transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.2s ease;
    opacity: 1;
  }
  .controls-body.hidden {
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
    opacity: 0;
    overflow: hidden;
  }
  .controls-body::-webkit-scrollbar { width: 4px; }
  .controls-body::-webkit-scrollbar-track { background: transparent; }
  .controls-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  .controls h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 14px;
    font-weight: 500;
  }
  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .control-row:last-child { margin-bottom: 0; }
  .control-row label {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    white-space: nowrap;
    margin-right: 12px;
  }
  .toggle-group {
    display: flex;
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .toggle-group button {
    background: none;
    border: none;
    color: rgba(255,255,255,0.45);
    padding: 5px 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .toggle-group button.active {
    background: rgba(111, 44, 255, 0.6);
    color: #fff;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 110px;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.12);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #6F2CFF;
    border: 2px solid rgba(255,255,255,0.3);
    cursor: pointer;
  }
  .color-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .color-row input[type="color"] {
    -webkit-appearance: none;
    appearance: none;
    width: 28px; height: 28px;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    background: none;
    cursor: pointer;
    padding: 0;
  }
  .color-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  .color-row input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }
  .separator {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 14px 0;
  }
  .preset-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .preset-swatch {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 2px solid rgba(255,255,255,0.15);
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .preset-swatch:hover {
    border-color: rgba(255,255,255,0.5);
    transform: scale(1.1);
  }
  .preset-swatch.active {
    border-color: #fff;
  }
  .val {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    min-width: 24px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    margin-left: 6px;
  }
  select {
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: rgba(255,255,255,0.8);
    padding: 4px 24px 4px 10px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='rgba(255,255,255,0.4)' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 8px center;
  }
  select:hover {
    border-color: rgba(255,255,255,0.25);
  }
  select option {
    background: #1e0a3c;
    color: #e0d8ff;
  }
  .effect-panel { transition: max-height 0.3s ease, opacity 0.2s ease; max-height: 500px; opacity: 1; overflow: hidden; }
  .effect-panel.hidden { max-height: 0; opacity: 0; pointer-events: none; }
</style>

<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

// --- Helpers ---
function createShader(gl, type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    gl.deleteShader(s);
    return null;
  }
  return s;
}
function createProgram(gl, vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, vs);
  gl.attachShader(p, fs);
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(p));
    return null;
  }
  return p;
}
function hexToRGB(hex) {
  const r = parseInt(hex.slice(1,3), 16) / 255;
  const g = parseInt(hex.slice(3,5), 16) / 255;
  const b = parseInt(hex.slice(5,7), 16) / 255;
  return [r, g, b];
}

// --- Font atlas ---
function createFontAtlas(gl) {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*+=<>{}[]~^:.";
  const cols = 16;
  const rows = Math.ceil(chars.length / cols);
  const cellSize = 32;
  const oc = document.createElement('canvas');
  oc.width = cols * cellSize;
  oc.height = rows * cellSize;
  const ctx = oc.getContext('2d');
  ctx.clearRect(0, 0, oc.width, oc.height);
  ctx.fillStyle = 'white';
  ctx.font = `bold ${cellSize * 0.7}px "SF Mono", "Fira Code", "Menlo", "Consolas", monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < chars.length; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    ctx.fillText(chars[i], col * cellSize + cellSize/2, row * cellSize + cellSize/2);
  }
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, oc);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  return { tex, cols, rows, totalChars: chars.length };
}

// --- Logo texture ---
function createLogoTexture(gl) {
  const size = 512;
  const oc = document.createElement('canvas');
  oc.width = size; oc.height = size;
  const ctx = oc.getContext('2d');
  ctx.clearRect(0, 0, size, size);
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, oc);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  return tex;
}

// --- Shaders ---
const vertSrc = `
attribute vec2 aPos;
varying vec2 vUv;
void main() {
  vUv = aPos * 0.5 + 0.5;
  gl_Position = vec4(aPos, 0.0, 1.0);
}`;

const fragSrc = `
precision highp float;

varying vec2 vUv;
uniform float uTime;
uniform vec2 uResolution;
uniform sampler2D uLogo;
uniform sampler2D uFont;
uniform float uMode;
uniform float uGlow;
uniform float uSpeed;
uniform float uDensity;
uniform float uShimmer;
uniform float uBlur;
uniform float uLogoScale;
uniform vec2 uFontGrid;
uniform float uTotalChars;
uniform vec3 uColorTop;
uniform vec3 uColorBottom;
uniform vec3 uDotColorBase;
uniform vec3 uDotColorHighlight;
uniform float uMouseOn;
uniform float uMouseMode;     // 0=push, 1=pull, 2=glow
uniform float uMouseRadius;
uniform float uMouseStrength;
uniform vec2 uMousePos;       // normalized 0-1
uniform float uEffectType;   // 0=off, 1=ripple, 2=spiral, 3=lines
uniform float uRippleStrength;
uniform float uRippleSpeed;
uniform float uRippleCount;
uniform float uRippleRadius;
uniform float uRippleThickness;
uniform float uRippleBlend;
uniform float uRippleHole;
uniform float uSpiralStrength;
uniform float uSpiralSpeed;
uniform float uSpiralArms;
uniform float uSpiralScale;
uniform float uSpiralThickness;
uniform float uSpiralHole;
uniform float uLinesStrength;
uniform float uLinesSpeed;
uniform float uLinesCount;
uniform float uLinesThickness;

float hash(vec2 p) {
  return fract(sin(p.x * 127.1 + p.y * 311.7) * 43758.5453);
}
float hash2(vec2 p) {
  return fract(sin(p.x * 269.5 + p.y * 183.3) * 65137.2831);
}

void main() {
  vec2 uv = vUv;
  float aspect = uResolution.x / uResolution.y;
  float t = uTime * (0.2 + uSpeed * 0.8);

  // --- Background gradient ---
  vec3 bg = mix(uColorBottom, uColorTop, uv.y);

  // --- Logo variables (kept for dot/line interactions, but logo itself not drawn) ---
  float logoScale = uLogoScale;
  vec2 lCenter = vec2(0.5, 0.50);
  float logoMask = 0.0;
  float logoBlurred = 0.0;
  vec3 glowCol = mix(uDotColorBase, uDotColorHighlight, 0.7);
  float pulse = 0.92 + 0.08 * sin(t * 1.2);

  // --- Lines: per-pixel streaks + logo hit illumination ---
  float linesLogoBoost = 0.0;
  if (uEffectType > 2.5) {
    float lSpeed = 1.0 + uLinesSpeed * 5.0;
    float lThick = 0.003 + uLinesThickness * 0.02;

    for (float i = 0.0; i < 30.0; i += 1.0) {
      if (i >= uLinesCount) break;

      float lineId = i + 0.5;
      float lineY = fract(sin(lineId * 73.137) * 43758.5453);
      float lineSpeedVar = 0.6 + fract(sin(lineId * 91.331) * 28461.713) * 0.8;

      float yDist = abs(uv.y - lineY);
      float yBand = smoothstep(lThick, lThick * 0.1, yDist);
      if (yBand < 0.001) continue;

      float headX = fract(uTime * lSpeed * lineSpeedVar * 0.08);
      float trailLen = 0.1 + uLinesStrength * 0.25;
      float xDist = uv.x - headX;
      if (xDist < -0.5) xDist += 1.0;
      if (xDist > 0.5) xDist -= 1.0;

      float trail = smoothstep(trailLen, 0.0, -xDist) * smoothstep(-0.005, 0.01, -xDist);
      float lineGlow = yBand * trail * uLinesStrength * 0.15;

      bg += uDotColorHighlight * lineGlow * 0.3;

      // All lines illuminate the logo when crossing
      float logoXDist = abs(headX - lCenter.x);
      if (logoXDist < uLogoScale * 0.6) {
        linesLogoBoost += yBand * trail * uLinesStrength * 0.5;
      }
    }

    bg += glowCol * linesLogoBoost * logoBlurred * 1.5;
  }

  // --- Dot / ASCII grid ---
  float spacing = mix(18.0, 10.0, uDensity);
  // More spacing for Tuist logo mode
  if (uMode > 1.5) spacing = mix(28.0, 16.0, uDensity);
  vec2 px = uv * uResolution;

  float scrollY = t * 8.0;
  float waveX = sin(uv.y * 4.0 + t * 0.5) * 1.5;
  vec2 animPx = px + vec2(waveX, scrollY);

  vec2 cell = floor(animPx / spacing);
  vec2 cellCenter = (cell + 0.5) * spacing;
  vec2 cellUv = (cellCenter - vec2(waveX, scrollY)) / uResolution;

  // --- Effect wave affecting dots (ripple OR spiral, not both) ---
  float rippleWave = 0.0;    // -1 to 1, directional push
  float rippleEnergy = 0.0;  // 0 to 1, absolute energy for brightness/size
  float effectHoleFade = 1.0; // 1 = no hole, 0 = inside hole

  if (uEffectType > 0.5) {
    vec2 dotToCenter = (cellUv - lCenter) * vec2(aspect, 1.0);
    float dotDist = length(dotToCenter);
    float dotAngle = atan(dotToCenter.y, dotToCenter.x);

    if (uEffectType < 1.5) {
      // === RIPPLES: expanding concentric rings ===
      float rSpeed = 0.05 + uRippleSpeed * 0.4;
      float maxRadius = 0.3 + uRippleRadius * 1.5;
      float waveWidth = 0.02 + uRippleThickness * 0.12;

      for (float i = 0.0; i < 16.0; i += 1.0) {
        if (i >= uRippleCount) break;

        float phase = fract(uTime * rSpeed - i * (1.0 / uRippleCount));
        float ringRadius = phase * maxRadius;

        float signedDist = dotDist - ringRadius;
        float wave = exp(-signedDist * signedDist / (waveWidth * waveWidth));
        float directional = -signedDist / (waveWidth * 0.5);
        directional = clamp(directional, -1.0, 1.0);

        float fadeOut = 1.0 - phase;
        fadeOut = fadeOut * fadeOut;
        float fadeIn = smoothstep(0.0, 0.06, phase);
        float life = fadeIn * fadeOut;

        rippleWave += directional * wave * life;
        rippleEnergy += wave * life;
      }
      rippleWave *= uRippleStrength;
      rippleEnergy *= uRippleStrength;

      // Center hole
      float rHoleRadius = uRippleHole * 0.6;
      float rHoleFade = smoothstep(rHoleRadius, rHoleRadius + 0.08, dotDist);
      rippleWave *= rHoleFade;
      rippleEnergy *= rHoleFade;
      effectHoleFade = rHoleFade;

    } else if (uEffectType < 2.5) {
      // === SPIRAL: infinite depth void — falling into a tunnel ===
      float sSpeed = 0.3 + uSpiralSpeed * 2.0;
      float sTwist = 1.0 + uSpiralScale * 5.0;
      float sThick = 0.1 + uSpiralThickness * 1.8;
      float bandCount = 1.0 + uSpiralArms * 2.0;

      // Log-polar coordinates create infinite depth
      float logDist = log(max(dotDist, 0.001)) * bandCount;

      float spiralPhase = logDist - dotAngle * sTwist - uTime * sSpeed;

      // bandVal ranges -1 to 1
      // At high sThick (up to ~1.9), the lower edge pushes to nearly -1
      // meaning almost everything passes = thick bands with thin dark seams
      float bandVal = sin(spiralPhase);
      float wave = smoothstep(-sThick, -sThick + 0.25, bandVal);

      // Center hole — fades to black inside the hole radius
      float holeRadius = uSpiralHole * 0.6;
      float holeFade = smoothstep(holeRadius, holeRadius + 0.08, dotDist);
      wave *= holeFade;
      effectHoleFade = holeFade;

      rippleEnergy = wave * uSpiralStrength;
      rippleWave = wave * uSpiralStrength * 0.3;

    } else {
      // === LINES: horizontal streaks moving left to right ===
      float lSpeed = 1.0 + uLinesSpeed * 5.0;
      float lThick = 0.005 + uLinesThickness * 0.04;

      for (float i = 0.0; i < 30.0; i += 1.0) {
        if (i >= uLinesCount) break;

        float lineId = i + 0.5;
        float lineY = fract(sin(lineId * 73.137) * 43758.5453);
        float lineSpeedVar = 0.6 + fract(sin(lineId * 91.331) * 28461.713) * 0.8;

        float yDist = abs(cellUv.y - lineY);
        float yBand = smoothstep(lThick, lThick * 0.1, yDist);

        if (yBand < 0.001) continue;

        float headX = fract(uTime * lSpeed * lineSpeedVar * 0.08);

        float trailLen = 0.15 + uLinesStrength * 0.3;
        float xDist = cellUv.x - headX;
        if (xDist < -0.5) xDist += 1.0;
        if (xDist > 0.5) xDist -= 1.0;

        float trail = smoothstep(trailLen, 0.0, -xDist) * smoothstep(-0.01, 0.02, -xDist);
        float lineEnergy = yBand * trail;

        // All lines illuminate logo when crossing
        float logoXDist = abs(headX - lCenter.x);
        float logoYDist = abs(lineY - lCenter.y);
        float crossingLogo = step(logoXDist, uLogoScale * 0.5) * step(logoYDist, uLogoScale * 0.5);

        rippleEnergy += lineEnergy * uLinesStrength * (1.0 + crossingLogo * 2.0);
        rippleWave += lineEnergy * uLinesStrength * 0.4;
      }
    }
  }

  // Apply effect displacement to dot center position
  vec2 dotWorldPos = cellCenter - vec2(waveX, scrollY);
  if (abs(rippleWave) > 0.001) {
    if (uEffectType > 2.5) {
      // Lines: push horizontally to the right
      dotWorldPos += vec2(1.0, 0.0) * rippleWave * spacing * 0.5;
    } else {
      // Ripples/Spiral: push radially from center
      vec2 centerPx = lCenter * uResolution;
      vec2 dirPx = dotWorldPos - centerPx;
      float dirLen = length(dirPx);
      if (dirLen > 1.0) {
        dotWorldPos += (dirPx / dirLen) * rippleWave * spacing * 0.35;
      }
    }
  }

  // --- Mouse interaction ---
  float mouseProximity = 0.0;
  vec2 mouseOffset = vec2(0.0);
  if (uMouseOn > 0.5) {
    vec2 mousePx = uMousePos * uResolution;
    vec2 toDot = dotWorldPos - mousePx;
    float mouseDist = length(toDot);
    float mouseRadius = uMouseRadius * uResolution.y * 0.15;

    // Smooth falloff from cursor
    mouseProximity = smoothstep(mouseRadius, 0.0, mouseDist);
    mouseProximity = mouseProximity * mouseProximity;

    float force = mouseProximity * uMouseStrength * spacing * 3.0;

    if (mouseDist > 1.0) {
      vec2 pushDir = toDot / mouseDist;

      if (uMouseMode < 0.5) {
        // Push: dots flee from cursor
        dotWorldPos += pushDir * force;
        mouseOffset = pushDir * force;
      } else if (uMouseMode < 1.5) {
        // Pull: dots attracted toward cursor
        dotWorldPos -= pushDir * force * 0.6;
        mouseOffset = -pushDir * force * 0.6;
      }
      // Glow mode: no displacement, just brightness (handled below)
    }
  }

  float distToDot = length(px - dotWorldPos);

  float rnd = hash(cell);
  float rnd2 = hash2(cell);

  // Light from logo SHAPE
  vec2 dotLogoUv = (cellUv - lCenter) * vec2(aspect, 1.0) / logoScale + 0.5;
  float logoHit = 0.0;
  if (dotLogoUv.x > 0.0 && dotLogoUv.x < 1.0 && dotLogoUv.y > 0.0 && dotLogoUv.y < 1.0) {
    vec4 lSample = texture2D(uLogo, vec2(dotLogoUv.x, 1.0 - dotLogoUv.y));
    logoHit = lSample.r * lSample.a;
  }

  // Blurred logo for soft glow spread
  float logoBlurDot = 0.0;
  for (float bi = 0.0; bi < 8.0; bi += 1.0) {
    float ba = bi * 0.7854;
    for (float br = 1.0; br <= 3.0; br += 1.0) {
      vec2 boff = vec2(cos(ba), sin(ba)) * br * (0.005 + uBlur * 0.06);
      vec2 bduv = (cellUv + boff - lCenter) * vec2(aspect, 1.0) / logoScale + 0.5;
      if (bduv.x > 0.0 && bduv.x < 1.0 && bduv.y > 0.0 && bduv.y < 1.0) {
        vec4 bs = texture2D(uLogo, vec2(bduv.x, 1.0 - bduv.y));
        logoBlurDot += bs.r * bs.a;
      }
    }
  }
  logoBlurDot /= 24.0;

  float logoLight = (logoHit + logoBlurDot * 0.7) * uGlow;
  float totalLight = logoLight;

  // Ripple boosts brightness
  totalLight += rippleEnergy * 0.8;

  // Mouse glow boost
  totalLight += mouseProximity * uMouseStrength * 1.5;

  // Shimmer
  float shim = sin(t * (2.0 + rnd * 3.0) + rnd * 6.283 + cell.x * 0.5) * 0.5 + 0.5;
  shim = pow(shim, 2.0);
  float shimmerFactor = mix(1.0, shim, uShimmer);

  float baseAlpha = 0.35 + 0.1 * sin(rnd * 6.28);
  float dotAlpha = (baseAlpha + totalLight * 0.55) * shimmerFactor;
  dotAlpha = clamp(dotAlpha, 0.0, 1.0);

  // Color: base → highlight as light increases
  vec3 baseCharColor = mix(
    uDotColorBase,
    uDotColorHighlight,
    totalLight
  );

  // Ripple color influence via blend modes
  vec3 charColor = baseCharColor;
  if (rippleEnergy > 0.001) {
    vec3 rippleTint = mix(uDotColorBase * 1.2, uDotColorHighlight, rippleEnergy);
    if (uRippleBlend < 0.5) {
      // Additive
      charColor = baseCharColor + rippleTint * rippleEnergy * 0.6;
    } else if (uRippleBlend < 1.5) {
      // Screen
      charColor = 1.0 - (1.0 - baseCharColor) * (1.0 - rippleTint * rippleEnergy * 0.5);
    } else if (uRippleBlend < 2.5) {
      // Soft Light
      charColor = mix(baseCharColor, baseCharColor * rippleTint + sqrt(baseCharColor) * rippleEnergy * 0.3, rippleEnergy);
    } else {
      // Overlay
      vec3 d = step(0.5, baseCharColor);
      vec3 ovA = 2.0 * baseCharColor * rippleTint;
      vec3 ovB = 1.0 - 2.0 * (1.0 - baseCharColor) * (1.0 - rippleTint);
      charColor = mix(baseCharColor, mix(ovA, ovB, d), rippleEnergy * 0.7);
    }
  }

  float charMask = 0.0;

  // Compute effect displacement offset in pixel space (shared across all modes)
  vec2 rippleOffset = vec2(0.0);
  if (abs(rippleWave) > 0.001) {
    if (uEffectType > 2.5) {
      // Lines: horizontal offset
      rippleOffset = vec2(1.0, 0.0) * rippleWave * spacing * 0.5;
    } else {
      vec2 centerPx = lCenter * uResolution;
      vec2 origPos = cellCenter - vec2(waveX, scrollY);
      vec2 dirPx = origPos - centerPx;
      float dirLen = length(dirPx);
      if (dirLen > 1.0) {
        rippleOffset = (dirPx / dirLen) * rippleWave * spacing * 0.35;
      }
    }
  }

  // Cell-local position offset by ripple + mouse displacement
  vec2 localPx = animPx - cell * spacing - rippleOffset - mouseOffset;
  vec2 cellFrac = localPx / spacing;

  if (uMode < 0.5) {
    // DOT MODE — ripple enlarges and displaces dots
    float dotR = 1.2 + totalLight * 0.6 + rippleEnergy * 1.5 + mouseProximity * 3.0;
    charMask = smoothstep(dotR + 0.5, dotR - 0.5, distToDot);
  } else if (uMode < 1.5) {
    // ASCII MODE — ripple displaces and scales characters
    float charIdx = floor(rnd2 * uTotalChars);
    charIdx = mod(charIdx + floor(t * (0.5 + rnd * 1.0)), uTotalChars);
    float col = mod(charIdx, uFontGrid.x);
    float row = floor(charIdx / uFontGrid.x);
    float charScale = max(0.2, 0.85 - rippleEnergy * 0.25 - mouseProximity * 0.35);
    vec2 charUv = (cellFrac - 0.5) / charScale + 0.5;
    if (charUv.x > 0.0 && charUv.x < 1.0 && charUv.y > 0.0 && charUv.y < 1.0) {
      vec2 atlasUv = vec2(
        (col + charUv.x) / uFontGrid.x,
        (row + charUv.y) / uFontGrid.y
      );
      vec4 fontSample = texture2D(uFont, atlasUv);
      charMask = max(fontSample.r, fontSample.g) * fontSample.a;
    }
  } else {
    // TUIST LOGO MODE — ripple displaces and scales logos
    float logoTileScale = max(0.15, 0.5 - rippleEnergy * 0.15 - mouseProximity * 0.2);
    vec2 tileUv = (cellFrac - 0.5) / logoTileScale + 0.5;
    if (tileUv.x > 0.0 && tileUv.x < 1.0 && tileUv.y > 0.0 && tileUv.y < 1.0) {
      vec4 logoSample = texture2D(uLogo, vec2(tileUv.x, 1.0 - tileUv.y));
      charMask = logoSample.r * logoSample.a;
    }
  }

  float particleOpacity = charMask * dotAlpha * effectHoleFade;
  vec3 col = mix(bg, charColor, particleOpacity);

  // Vignette
  vec2 vig = (uv - 0.5) * vec2(aspect, 1.0);
  float v = 1.0 - smoothstep(0.4, 1.3, length(vig));
  col *= mix(0.8, 1.0, v);

  col = clamp(col, 0.0, 1.0);
  gl_FragColor = vec4(col, 1.0);
}`;

document.getElementById('mouseRadiusSlider').addEventListener('input', (e) => { mouseRadius = e.target.value / 100; document.getElementById('mouseRadiusVal').textContent = e.target.value; });
document.getElementById('mouseStrengthSlider').addEventListener('input', (e) => { mouseStrength = e.target.value / 100; document.getElementById('mouseStrengthVal').textContent = e.target.value; });

// --- Mouse position tracking (document-level so it works over the panel too) ---
document.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mousePos[0] = (e.clientX - rect.left) / rect.width;
  mousePos[1] = 1.0 - ((e.clientY - rect.top) / rect.height);
});
document.addEventListener('touchmove', (e) => {
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  mousePos[0] = (touch.clientX - rect.left) / rect.width;
  mousePos[1] = 1.0 - ((touch.clientY - rect.top) / rect.height);
}, { passive: true });

// --- Resize ---
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  // When embedded in an iframe (e.g. Slidev), the parent applies CSS transform: scale()
  // which makes window.innerWidth and getBoundingClientRect() return the small unscaled size.
  // Use the top window's viewport size instead since the shader fills the whole screen.
  let w, h;
  try {
    w = window.top.innerWidth;
    h = window.top.innerHeight;
  } catch (e) {
    w = window.innerWidth;
    h = window.innerHeight;
  }
  const displayWidth = Math.round(w * dpr);
  const displayHeight = Math.round(h * dpr);
  if (canvas.width !== displayWidth || canvas.height !== displayHeight) {
    canvas.width = displayWidth;
    canvas.height = displayHeight;
  }
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);
window.top?.addEventListener?.('resize', resize);

// --- Render ---
const startTime = performance.now();
function render() {
  const t = (performance.now() - startTime) / 1000.0;

  gl.useProgram(program);
  gl.enableVertexAttribArray(posLoc);
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

  gl.uniform1f(uTimeLoc, t);
  gl.uniform2f(uResLoc, canvas.width, canvas.height);
  gl.uniform1f(uModeLoc, mode);
  gl.uniform1f(uGlowLoc, glowVal);
  gl.uniform1f(uSpeedLoc, speedVal);
  gl.uniform1f(uDensityLoc, densityVal);
  gl.uniform1f(uShimmerLoc, shimmerVal);
  gl.uniform1f(uBlurLoc, blurVal);
  gl.uniform1f(uLogoScaleLoc, logoScaleVal);
  gl.uniform2f(uFontGridLoc, fontAtlas.cols, fontAtlas.rows);
  gl.uniform1f(uTotalCharsLoc, fontAtlas.totalChars);
  gl.uniform3f(uColorTopLoc, colorTop[0], colorTop[1], colorTop[2]);
  gl.uniform3f(uColorBottomLoc, colorBottom[0], colorBottom[1], colorBottom[2]);
  gl.uniform3f(uDotColorBaseLoc, dotColorBase[0], dotColorBase[1], dotColorBase[2]);
  gl.uniform3f(uDotColorHighlightLoc, dotColorHighlight[0], dotColorHighlight[1], dotColorHighlight[2]);
  gl.uniform1f(uMouseOnLoc, mouseOn);
  gl.uniform1f(uMouseModeLoc, mouseMode);
  gl.uniform1f(uMouseRadiusLoc, mouseRadius);
  gl.uniform1f(uMouseStrengthLoc, mouseStrength);
  gl.uniform2f(uMousePosLoc, mousePos[0], mousePos[1]);
  gl.uniform1f(uEffectTypeLoc, effectType);
  gl.uniform1f(uRippleStrengthLoc, rippleStrength);
  gl.uniform1f(uRippleSpeedLoc, rippleSpeed);
  gl.uniform1f(uRippleCountLoc, rippleCount);
  gl.uniform1f(uRippleRadiusLoc, rippleRadius);
  gl.uniform1f(uRippleThicknessLoc, rippleThickness);
  gl.uniform1f(uRippleBlendLoc, rippleBlend);
  gl.uniform1f(uRippleHoleLoc, rippleHole);
  gl.uniform1f(uSpiralStrengthLoc, spiralStrength);
  gl.uniform1f(uSpiralSpeedLoc, spiralSpeed);
  gl.uniform1f(uSpiralArmsLoc, spiralArms);
  gl.uniform1f(uSpiralScaleLoc, spiralScale);
  gl.uniform1f(uSpiralThicknessLoc, spiralThickness);
  gl.uniform1f(uSpiralHoleLoc, spiralHole);
  gl.uniform1f(uLinesStrengthLoc, linesStrength);
  gl.uniform1f(uLinesSpeedLoc, linesSpeed);
  gl.uniform1f(uLinesCountLoc, linesCount);
  gl.uniform1f(uLinesThicknessLoc, linesThickness);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, logoTex);
  gl.uniform1i(uLogoLoc, 0);

  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, fontAtlas.tex);
  gl.uniform1i(uFontLoc, 1);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}
render();

// --- Draggable panel ---
const panel = document.getElementById('controlsPanel');
const handle = document.getElementById('dragHandle');
let isDragging = false, dragOffX = 0, dragOffY = 0;

handle.addEventListener('mousedown', (e) => {
  if (e.target.closest('.collapse-btn')) return;
  isDragging = true;
  const rect = panel.getBoundingClientRect();
  dragOffX = e.clientX - rect.left;
  dragOffY = e.clientY - rect.top;
  // Switch from right-positioned to left-positioned for dragging
  panel.style.left = rect.left + 'px';
  panel.style.top = rect.top + 'px';
  panel.style.right = 'auto';
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  let x = e.clientX - dragOffX;
  let y = e.clientY - dragOffY;
  // Clamp within viewport
  x = Math.max(0, Math.min(window.innerWidth - panel.offsetWidth, x));
  y = Math.max(0, Math.min(window.innerHeight - 40, y));
  panel.style.left = x + 'px';
  panel.style.top = y + 'px';
});

document.addEventListener('mouseup', () => { isDragging = false; });

// Touch support
handle.addEventListener('touchstart', (e) => {
  if (e.target.closest('.collapse-btn')) return;
  isDragging = true;
  const touch = e.touches[0];
  const rect = panel.getBoundingClientRect();
  dragOffX = touch.clientX - rect.left;
  dragOffY = touch.clientY - rect.top;
  panel.style.left = rect.left + 'px';
  panel.style.top = rect.top + 'px';
  panel.style.right = 'auto';
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  const touch = e.touches[0];
  let x = touch.clientX - dragOffX;
  let y = touch.clientY - dragOffY;
  x = Math.max(0, Math.min(window.innerWidth - panel.offsetWidth, x));
  y = Math.max(0, Math.min(window.innerHeight - 40, y));
  panel.style.left = x + 'px';
  panel.style.top = y + 'px';
}, { passive: true });

document.addEventListener('touchend', () => { isDragging = false; });

// --- Collapse toggle ---
const collapseBtn = document.getElementById('collapseBtn');
const controlsBody = document.getElementById('controlsBody');
let isCollapsed = false;

collapseBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  isCollapsed = !isCollapsed;
  controlsBody.classList.toggle('hidden', isCollapsed);
  collapseBtn.classList.toggle('collapsed', isCollapsed);
});
</script>
</body>
